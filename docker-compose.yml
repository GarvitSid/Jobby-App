version: '3.9'

services:
  mongo:
    image: mongo:7
    container_name: jobby-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jobby-backend
    restart: unless-stopped
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/jobby_app
      JWT_SECRET: docker_local_jwt_secret
      LOG_LEVEL: info
    ports:
      - "5000:5000"
    depends_on:
      - mongo

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: jobby-frontend
    restart: unless-stopped
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WDS_SOCKET_PORT: 0
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  mongo_data:
